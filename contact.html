<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Hareesh Vijay</title>
    <meta name="description" content="Get in touch with Hareesh Vijay.">
    <link rel="stylesheet" href="style1.css">
</head>

<body>

<header>
    <h1>Contact</h1>
    <button id="themeBtn">Toggle Theme</button>

    <nav aria-label="Main Navigation">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="todo.html">To-Do App</a></li>
            <li><a href="contact.html" aria-current="page">Contact</a></li>
        </ul>
    </nav>
</header>

<main>
    <section>
        <h2>Get In Touch</h2>
        
        <div class="contact-container">
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="email@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" placeholder="Tell me about your project or inquiry..." required></textarea>
                </div>
                
                <button type="submit" class="submit-btn">Send Message</button>
            </form>

            <div class="contact-socials">
                <a href="#" class="social-icon" aria-label="LinkedIn">In</a>
                <a href="#" class="social-icon" aria-label="GitHub">Gh</a>
                <a href="#" class="social-icon" aria-label="Twitter">Tw</a>
            </div>
        </div>
    </section>
</main>

<footer>
    <p>&copy; 2026 Hareesh Vijay</p>
</footer>

<script>
const btn = document.getElementById("themeBtn");

// Load saved theme
if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark-mode");
}

// Toggle theme
btn.addEventListener("click", () => {
    document.body.classList.toggle("dark-mode");

    if (document.body.classList.contains("dark-mode")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
});
</script>
</body>
</html>
