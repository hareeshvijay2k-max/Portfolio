<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Personal portfolio of Hareesh Vijay showcasing skills, projects, and contact information.">

    <meta property="og:type" content="website">

    <link rel="canonical" href="https://example.com/">

<body>

<header role="banner">
    <h1>Hareesh Vijay Portfolio</h1>

    Toggle Theme
</button>

    <nav aria-label="Main Navigation">
        <ul>
            <li><a href="index.html" aria-current="page">Home</a></li>

    </nav>
</header>

<main>

<section class="hero">

    <p>
        I am a passionate developer creating accessible and user-friendly web experiences.
    </p>

    <h2>Skills</h2>

<footer>

</footer>

<script>
const btn = document.getElementById('themeBtn');

btn.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
});

const title = document.getElementById("welcomeTitle");

title.addEventListener("click", () => {
    title.classList.remove("pop");
    void title.offsetWidth; // restart animation
    title.classList.add("pop");
});
</script>
