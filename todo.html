<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App | Hareesh Vijay</title>
    <meta name="description" content="An interactive To-Do List application demonstrating JavaScript state management and DOM manipulation.">
    <link rel="stylesheet" href="style1.css">
</head>

<body>

<header>
    <h1>📝 To-Do App</h1>
    <button id="themeBtn">🌙 Toggle Theme</button>

    <nav aria-label="Main Navigation">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="todo.html" aria-current="page">To-Do App</a></li>
            <li><a href="weather.html">Weather</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<main>
    <section class="todo-container">
        <div class="todo-wrapper">
            <!-- Header -->
            <div class="todo-header">
                <h2>My Tasks</h2>
                <p>Stay organized and track your progress</p>
            </div>

            <!-- Input Section -->
            <div class="todo-input-section">
                <input 
                    type="text" 
                    id="todoInput" 
                    class="todo-input" 
                    placeholder="Add a new task..."
                    aria-label="Add a new task"
                >
                <button id="addBtn" class="add-btn">Add Task</button>
            </div>

            <!-- Filter Buttons -->
            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <!-- Task Stats -->
            <div class="task-stats">
                <span>Total: <strong id="totalCount">0</strong></span>
                <span>Active: <strong id="activeCount">0</strong></span>
                <span>Completed: <strong id="completedCount">0</strong></span>
            </div>

            <!-- Tasks List -->
            <ul id="todoList" class="todo-list" aria-label="Task list">
                <!-- Tasks will be dynamically added here -->
            </ul>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state">
                <p>✨ No tasks yet. Add one to get started!</p>
            </div>

            <!-- Clear Completed Button -->
            <div class="todo-actions">
                <button id="clearBtn" class="clear-btn">Clear Completed</button>
            </div>
        </div>
    </section>
</main>

<footer>
    <p>&copy; 2026 Hareesh Vijay</p>
</footer>

<script src="todo.js"></script>
<script>
const btn = document.getElementById("themeBtn");

// Load saved theme
if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark-mode");
    btn.textContent = "☀️ Toggle Theme";
}

// Toggle theme
btn.addEventListener("click", () => {
    document.body.classList.toggle("dark-mode");

    if (document.body.classList.contains("dark-mode")) {
        localStorage.setItem("theme", "dark");
        btn.textContent = "☀️ Toggle Theme";
    } else {
        localStorage.setItem("theme", "light");
        btn.textContent = "🌙 Toggle Theme";
    }
});
</script>
</body>
</html>
